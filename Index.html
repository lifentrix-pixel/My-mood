```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Innerscape - Mood Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      background: #0d0d14; 
      color: white; 
      padding: 20px; 
      line-height: 1.6;
    }
    .container { max-width: 400px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 30px; color: #a78bfa; }
    .mood-section { 
      background: #1a1a24; 
      padding: 30px; 
      border-radius: 20px; 
      margin-bottom: 30px; 
    }
    .slider { width: 100%; margin: 20px 0; }
    input[type="range"] { 
      width: 100%; 
      height: 8px; 
      background: #333; 
      border-radius: 5px; 
      outline: none; 
    }
    .mood-value { 
      text-align: center; 
      font-size: 48px; 
      color: #a78bfa; 
      font-weight: bold; 
    }
    textarea { 
      width: 100%; 
      padding: 15px; 
      border-radius: 10px; 
      border: 1px solid #333; 
      background: #0d0d14; 
      color: white; 
      font-family: inherit; 
      resize: vertical; 
      min-height: 100px; 
    }
    button { 
      width: 100%; 
      padding: 15px; 
      background: linear-gradient(135deg, #a78bfa, #8b5cf6); 
      border: none; 
      border-radius: 15px; 
      color: white; 
      font-size: 16px; 
      font-weight: 600; 
      cursor: pointer; 
      margin-top: 20px; 
    }
    button:active { transform: scale(0.98); }
    .status { text-align: center; margin-top: 20px; color: #10b981; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✨ Innerscape</h1>
    
    <div class="mood-section">
      <h2>How are you feeling?</h2>
      <div class="mood-value" id="moodDisplay">5</div>
      <input type="range" id="moodSlider" class="slider" min="1" max="10" value="5">
      <div style="display: flex; justify-content: space-between; margin-top: 10px;">
        <span>😔</span>
        <span>😊</span>
      </div>
    </div>
    
    <textarea id="note" placeholder="What's on your mind?"></textarea>
    
    <button onclick="saveEntry()">Save Check-In</button>
    
    <div class="status" id="status"></div>
  </div>

  <script>
    const slider = document.getElementById('moodSlider');
    const display = document.getElementById('moodDisplay');
    
    slider.addEventListener('input', function() {
      display.textContent = this.value;
    });
    
    function saveEntry() {
      const mood = slider.value;
      const note = document.getElementById('note').value;
      const status = document.getElementById('status');
      
      status.textContent = `✅ Saved! Mood: ${mood}/10`;
      document.getElementById('note').value = '';
      
      setTimeout(() => {
        status.textContent = '';
      }, 3000);
    }
  </script>
</body>
</html>
