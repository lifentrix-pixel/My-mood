function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function dateTimeToTs(date, time) {
  const [h, m] = time.split(':').map(Number);
  const d = new Date(date + 'T00:00:00');
  d.setHours(h, m, 0, 0);
  return d.getTime();
}

function doImport() {
  const btn = document.getElementById('importBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = 'Importing...';

  try {
    let count = 0;

    // 1. Mood entries → innerscape_entries
    // Format: {ts, scores: {body, energy, mood, mind}, notes: {body, energy, mood, mind}}
    const moodEntries = DATA.mood_entries.map((e, i) => ({
      ts: dateTimeToTs(e.date, e.time) + i, // +i to ensure unique ts
      scores: {
        body: (e.ratings && e.ratings.body) || 0,
        energy: (e.ratings && e.ratings.energy) || 0,
        mood: (e.ratings && e.ratings.mood) || 0,
        mind: (e.ratings && e.ratings.mind) || 0
      },
      notes: e.notes || {}
    }));
    localStorage.setItem('innerscape_entries', JSON.stringify(moodEntries));
    count += moodEntries.length;

    // 2. Dreams → innerscape_dreams
    // Format: {ts, text, tags, noRecall?}
    const dreams = DATA.dreams.map((d, i) => {
      const isNoRecall = d.tags && d.tags.includes('no-recall');
      return {
        id: isNoRecall ? `norecall-import-${i}` : undefined,
        ts: new Date('2026-02-16').getTime() + i * 86400000, // spread across days
        text: d.text || '',
        tags: d.tags || [],
        noRecall: isNoRecall || false
      };
    });
    localStorage.setItem('innerscape_dreams', JSON.stringify(dreams));
    count += dreams.length;

    // 3. Timer sessions → innerscape_time_entries
    // Format: {activityId, startTime (ms), endTime (ms), duration (ms)}
    // We also need activities → innerscape_activities
    const activityNames = [...new Set(DATA.timer_sessions.map(s => s.activity))];
    const activities = activityNames.map((name, i) => {
      const emoji = name.match(/^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F)/u);
      return {
        id: 'import-act-' + i,
        name: name,
        emoji: emoji ? emoji[0] : '⏱️',
        color: ['#f87171','#fbbf24','#a78bfa','#34d399','#f472b6','#38bdf8','#fb923c','#818cf8','#4ade80','#e879f9'][i % 10],
        categoryId: 'cat-selfcare',
        createdAt: Date.now()
      };
    });
    const actMap = {};
    activities.forEach(a => { actMap[a.name] = a.id; });

    const timeEntries = DATA.timer_sessions.map((s, i) => {
      const startTs = dateTimeToTs(s.date, s.start_time) + i;
      const endTs = dateTimeToTs(s.date, s.end_time) + i;
      // Handle overnight sessions
      const adjustedEnd = endTs < startTs ? endTs + 86400000 : endTs;
      return {
        id: genId() + i,
        activityId: actMap[s.activity] || 'unknown',
        startTime: startTs,
        endTime: adjustedEnd,
        duration: s.duration_minutes * 60000
      };
    });

    localStorage.setItem('innerscape_activities', JSON.stringify(activities));
    localStorage.setItem('innerscape_time_entries', JSON.stringify(timeEntries));
    count += timeEntries.length;

    // 4. Meditation sessions → innerscape_meditations
    // Format: {ts, duration, rounds, mood}
    const meditations = DATA.meditation_sessions.map((m, i) => ({
      ts: dateTimeToTs(m.date, '12:00') + i,
      duration: m.duration_minutes,
      rounds: m.rounds,
      mood: m.mood_after
    }));
    localStorage.setItem('innerscape_meditations', JSON.stringify(meditations));
    count += meditations.length;

    // 5. Food entries → innerscape_food_entries
    // Format: {id, timestamp, mealType, description, satisfaction, tags, photo}
    const foodEntries = DATA.food_entries.map((f, i) => ({
      id: genId() + i,
      timestamp: dateTimeToTs(f.date, f.time) + i,
      mealType: f.meal_type,
      description: f.description,
      satisfaction: f.satisfaction,
      tags: f.tags || [],
      photo: null
    }));
    localStorage.setItem('innerscape_food_entries', JSON.stringify(foodEntries));
    count += foodEntries.length;

    // 6. Medications → innerscape_medications
    // Format: {id, name, dosage, frequency, color, createdAt}
    const medications = DATA.medications.map((m, i) => ({
      id: 'med-' + genId() + i,
      name: m.name,
      dosage: m.dosage,
      frequency: m.frequency,
      color: m.color,
      createdAt: new Date(m.created + 'T00:00:00').getTime()
    }));
    const medMap = {};
    medications.forEach(m => { medMap[m.name] = m; });
    localStorage.setItem('innerscape_medications', JSON.stringify(medications));
    count += medications.length;

    // 7. Medication logs → innerscape_medication_logs
    // Format: {id, medicationId, medicationName, dosage, timestamp, notes, createdAt}
    const medLogs = DATA.medication_logs.map((l, i) => {
      const med = medMap[l.medication_name];
      return {
        id: genId() + i,
        medicationId: med ? med.id : 'unknown',
        medicationName: l.medication_name,
        dosage: med ? med.dosage : '',
        timestamp: dateTimeToTs(l.date, l.time) + i,
        notes: l.notes || '',
        createdAt: dateTimeToTs(l.date, l.time) + i
      };
    });
    localStorage.setItem('innerscape_medication_logs', JSON.stringify(medLogs));
    count += medLogs.length;

    // 8. Todos → innerscape_todos
    // Format: {id, text, category, priority, notes, completed, completedAt, createdAt}
    const todos = DATA.todos.map((t, i) => ({
      id: genId() + i,
      text: t.text,
      category: t.category,
      priority: t.priority,
      notes: t.notes || '',
      completed: t.completed,
      completedAt: t.completed_date ? new Date(t.completed_date + 'T00:00:00').getTime() : null,
      createdAt: new Date(t.created + 'T00:00:00').getTime() + i
    }));
    localStorage.setItem('innerscape_todos', JSON.stringify(todos));
    count += todos.length;

    status.textContent = `✅ Imported ${count} items! Redirecting...`;
    setTimeout(() => { window.location.href = 'index.html'; }, 2000);

  } catch (err) {
    status.className = 'warn';
    status.textContent = '❌ Error: ' + err.message;
    btn.disabled = false;
  }
}
