<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Innerscape Import</title>
<style>
body{font-family:system-ui;max-width:500px;margin:40px auto;padding:20px;background:#1a1a2e;color:#e0e0e0}
h1{text-align:center;color:#a78bfa}
.btn{display:block;width:100%;padding:16px;margin:12px 0;border:none;border-radius:12px;font-size:16px;cursor:pointer;background:#a78bfa;color:white;font-weight:600}
.btn:active{opacity:0.8}
.status{padding:12px;margin:8px 0;border-radius:8px;background:#2a2a4a;font-size:14px}
.ok{background:#1a4a2a;color:#4ade80}
.warn{background:#4a3a1a;color:#fbbf24}
#file-input{display:none}
.info{text-align:center;color:#9892a6;font-size:14px;margin:16px 0}
</style></head><body>
<h1>📥 Innerscape Import</h1>
<p class="info">Pick a backup JSON file to import all your data</p>
<label class="btn" for="file-input">📂 Choose Backup File</label>
<input type="file" id="file-input" accept=".json,application/json">
<div id="result"></div>
<script>
document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    try {
      const data = JSON.parse(evt.target.result);
      importData(data);
    } catch(err) {
      document.getElementById('result').innerHTML = '<div class="status warn">❌ Error: ' + err.message + '</div>';
    }
  };
  reader.readAsText(file);
});

function importData(data) {
  const res = document.getElementById('result');
  const logs = [];

  function importKey(key, arr, label) {
    if (arr && arr.length) {
      // Merge: keep existing entries, add new ones by id/ts
      const existing = JSON.parse(localStorage.getItem(key) || '[]');
      const existingIds = new Set(existing.map(e => e.id || e.ts));
      const newItems = arr.filter(e => !existingIds.has(e.id || e.ts));
      const merged = [...existing, ...newItems];
      localStorage.setItem(key, JSON.stringify(merged));
      logs.push('<div class="status ok">✅ ' + label + ': ' + arr.length + ' total (' + newItems.length + ' new)</div>');
    }
  }

  function importObj(key, obj, label) {
    if (obj) {
      localStorage.setItem(key, JSON.stringify(obj));
      logs.push('<div class="status ok">✅ ' + label + ' restored</div>');
    }
  }

  // Core data
  importKey('innerscape_entries', data.mood_entries, 'Mood entries');
  importKey('innerscape_dreams', data.dreams, 'Dreams');
  importKey('innerscape_activities', data.activities, 'Activities');
  importKey('innerscape_time_entries', data.time_entries, 'Time entries');
  importKey('innerscape_meditations', data.meditation_sessions, 'Meditations');

  // Extended data (v14+)
  importKey('innerscape_food_entries', data.food_entries, 'Food entries');
  importKey('innerscape_medications', data.medications, 'Medications');
  importKey('innerscape_medication_logs', data.medication_logs, 'Medication logs');
  importKey('innerscape_todos', data.todos, 'Todos');
  importKey('innerscape_wishes', data.wishes, 'Wishes');
  importKey('innerscape_stool_entries', data.stool_entries, 'Stool entries');

  // Oura config/data (objects, not arrays)
  if (data.oura_config) importObj('innerscape_oura_config', data.oura_config, 'Oura config');
  if (data.oura_data) importObj('innerscape_oura_data', data.oura_data, 'Oura data');

  if (!logs.length) {
    logs.push('<div class="status warn">⚠️ No data found in this file</div>');
  } else {
    logs.unshift('<div class="status ok" style="font-weight:600;font-size:16px">🎉 Import complete! Version: ' + (data.version || 'unknown') + '</div>');
    logs.push('<div class="status info" style="margin-top:16px"><a href="/" style="color:#a78bfa">← Back to app</a></div>');
  }

  res.innerHTML = logs.join('');
}
</script>
</body></html>
